<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Share</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bgMusic" loop>
        <source src="bg.ogg" type="audio/ogg">
    </audio>

    <div class="container">
        <div class="upload-box" id="uploadBox">
            <svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 13v8"/>
                <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/>
                <path d="m8 17 4-4 4 4"/>
            </svg>
            <p class="title">Перетащите файлы сюда</p>
            <p class="subtitle">или нажмите для выбора</p>
            <input type="file" id="fileInput" multiple hidden>
        </div>

        <div class="result-box" id="resultBox" style="display: none;">
            <div class="success-icon">✓</div>
            <p class="filename" id="filename"></p>
            <p class="filesize" id="filesize"></p>

            <div class="link-container">
                <input type="text" id="linkInput" readonly>
                <button id="copyBtn">Копировать</button>
            </div>

            <button class="new-upload" id="newUploadBtn">Загрузить ещё</button>
        </div>

        <div class="settings-box" id="settingsBox" style="display: none;">
            <p class="settings-title">Настройки файла</p>
            <p class="settings-filename" id="settingsFilename"></p>

            <div class="setting-group">
                <div class="setting-label" id="passwordLabel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 9.8V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2h-3"/>
                        <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
                        <path d="M9 17v-2a2 2 0 0 0-4 0v2"/>
                        <rect width="8" height="5" x="3" y="17" rx="1"/>
                    </svg>
                    <span>Защита паролем</span>
                </div>
                <input type="text" id="passwordInput" placeholder="Введите пароль" disabled>
            </div>

            <div class="setting-group">
                <div class="setting-label" id="maxDownloadsLabel">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 22a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.704.706l3.588 3.588A2.4 2.4 0 0 1 20 8v12a2 2 0 0 1-2 2z"/>
                        <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
                        <path d="M12 9v4"/>
                        <path d="M12 17h.01"/>
                    </svg>
                    <span>Ограничить скачивания</span>
                </div>
                <input type="number" id="maxDownloadsInput" placeholder="Количество" min="1" disabled>
            </div>

            <div class="setting-group">
                <div class="setting-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 13V4a2 2 0 0 1 2-2h8a2.4 2.4 0 0 1 1.706.706l3.588 3.588A2.4 2.4 0 0 1 20 8v5"/>
                        <path d="M14 2v5a1 1 0 0 0 1 1h5"/>
                        <path d="M10 22v-5"/>
                        <path d="M14 19v-2"/>
                        <path d="M18 20v-3"/>
                        <path d="M2 13h20"/>
                        <path d="M6 20v-3"/>
                    </svg>
                    <span>Автоудаление через:</span>
                </div>
                <select id="autoDeleteTime">
                    <option value="5">5 минут</option>
                    <option value="15">15 минут</option>
                    <option value="30">30 минут</option>
                    <option value="60" selected>1 час</option>
                    <option value="180">3 часа</option>
                    <option value="360">6 часов</option>
                    <option value="720">12 часов</option>
                    <option value="1440">24 часа</option>
                </select>
            </div>

            <button class="publish-btn" id="publishBtn">Опубликовать</button>
        </div>

        <div class="loading" id="loading" style="display: none;">
            <div class="spinner"></div>
            <p>Загрузка...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
